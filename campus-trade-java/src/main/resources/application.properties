spring.application.name=campus-trade-java

# Server Config
server.port=8080

# MySQL Database connection
# Default: port=3306, user=root, password=123456
# Override with environment variables: DB_PORT, DB_USER, DB_PASS
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:campus_trade}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Ignore Open In View Warnings
spring.jpa.open-in-view=false

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
