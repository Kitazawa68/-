spring.application.name=campus-trade-java

# Server Config
server.port=8080

# MySQL Database connection (connecting to our docker container on 3308)
spring.datasource.url=jdbc:mysql://localhost:3308/campus_trade?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Ignore Open In View Warnings
spring.jpa.open-in-view=false

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
